<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Elderly Care App - Forgot Password</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: linear-gradient(135deg, #EAF7F6, #D9EEF2);
            display:flex;
            justify-content:right;
            align-items:center;
            min-height:100vh;
            padding:20px;
        }

        .container{
            width:100%;
            max-width:450px;
        }

        .forgot-card{
            background:white;
            border-radius:28px;
            padding:40px 35px;
            box-shadow:0 10px 30px rgba(0,0,0,0.08);
            text-align:center;
        }

        .logo-circle{
            width:90px;
            height:90px;
            background:#D7F0EE;
            border-radius:50%;
            margin:0 auto 20px;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:40px;
        }

        h1{
            font-size:2rem;
            color:#1F4E5F;
            margin-bottom:8px;
        }

        .subtitle{
            color:#5F7A82;
            margin-bottom:35px;
            font-size:1rem;
            line-height:1.5;
        }

        .input-group{
            text-align:left;
            margin-bottom:25px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-size:1rem;
            color:#35545D;
            font-weight:600;
        }

        input{
            width:100%;
            padding:18px;
            border:2px solid #DCEBED;
            border-radius:16px;
            font-size:1.05rem;
            background:#F9FCFD;
            outline:none;
            transition:0.3s;
        }

        input:focus{
            border-color:#74C7C5;
            background:white;
        }

        .reset-btn{
            width:100%;
            padding:18px;
            border:none;
            border-radius:18px;
            background:#5BA6A4;
            color:white;
            font-size:1.15rem;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .reset-btn:hover{
            transform:translateY(-2px);
            background:#4A9492;
        }

        .divider{
            margin:28px 0 22px;
            color:#7D9097;
            font-size:0.95rem;
        }

        .back-btn{
            width: 50%;
            padding:10px;
            border:2px solid #B9DFE0;
            border-radius:18px;
            background:#F4FBFB;
            color:#347A79;
            font-size:0.95rem;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
        }

        .back-btn:hover{
            background:#EAF7F6;
        }

        @media(max-width:480px){
            .forgot-card{
                padding:30px 25px;
            }

            h1{
                font-size:1.8rem;
            }

            input,
            .reset-btn,
            .back-btn{
                font-size:1rem;
                padding:16px;
            }

            .back-btn{
                width:50%;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="forgot-card">

            <div class="logo-circle"></div>

            <h1>Forgot Password?</h1>

            <p class="subtitle">
                No worries. Enter your email address and we'll help you reset your password.
            </p>

            <form>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email"
                           id="email"
                           placeholder="Enter your email"
                           required>
                </div>

                <button class="reset-btn" type="submit">
                    Send Reset Link
                </button>

            </form>

            <div class="divider">

                <a href="/">
                    <button class="back-btn" type="button">
                        Back to Login
                    </button>
                </a>
            </div>

        </div>
    </div>

</body>
</html>
